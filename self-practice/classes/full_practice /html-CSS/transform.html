<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D transform</title>
<style>
    .container{
        height: 100vh;
        width: 100vw;
        background-color: lightcoral;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .box{
        border: 2px solid black;
        height: 300px;
        width: 300px;
        background-color: lightgreen;
        font-size: 1cm;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 3s linear 0s;
    }
    .box:hover{
        transform: rotate(45deg);
        /* transform: scale(2); */
        /* transform: skew(30deg); */
        /* transform:translate(-200px,-200px); */
    }
</style>
</head>
<body>
    <div class="container">
        <div class="box">
            thi is to transform
        </div>
    </div>
</body>
</html>
