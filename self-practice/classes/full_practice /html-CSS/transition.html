<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        .box{
            width: 300px;
            height: 300px;
            border:2px solid black;
            background-color: aquamarine;
            padding: 3px;
            /* transition-property: all ;
            transition-duration: 3s;
            transition-delay: 1s;
            transition-timing-function: ease-in; */

            transition: all 2s ease-in 4s;
        }
        .box:hover{
            width:1000px;
            height: 700px;
            background-color: beige;
        }
    </style>
</head>
<body>
    <div class="box">
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Non dolores, a dolore quis, ducimus sit saepe incidunt rerum placeat iure porro expedita distinctio? Facere nam repellat placeat beatae, nulla maiores!</p>
    </div>
</body>
</html>
