<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <fieldset>
        <legend style="font-size:20px; font-weight:bold; color:#9f0b0b;">
            login form
        </legend>

        <label for="username">username:</label>
        <input type="text" id="username" name="username" placeholder="enter your name">
        <br><br>

        <label for="password">password:</label>
        <input type="password" id="password" name="password" placeholder="enter your password">
        <br><br>

        <input type="submit">
        <br><br>

        <label for="choose_date">choose date:</label>
        <input type="date" id="choose_date" name="choose_date">
        <br><br>

        <label for="appointment_time">appointment time:</label>
        <input type="time" id="appointment_time" name="appointment_time">
        <br><br>

        <label for="city">city:</label>
        <select id="city" name="city">
            <option value="hyd">HYD</option>
            <option value="mum">MUM</option>
            <option value="delhi">DELHI</option>
        </select>
        <br><br>

        <label for="thanoj">type here:</label>
        <textarea name="textarea1" id="thanoj" cols="50" rows="5"></textarea>

    </fieldset>
</form>
</body>
</html>
