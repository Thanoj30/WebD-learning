<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
</head>
<body>

    <h2>Job Application</h2>

    <form>

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="tel">Number:</label>
        <input type="tel" id="tel" name="tel" inputmode="numeric" required>
        <br><br>

        <label for="fileupload">Resume:</label>
        <input type="file" id="fileupload" name="resume" required>
        <br><br>

        <label for="experience">Experience (years):</label>
        <input type="number" id="experience" name="experience" min="0" max="50">
        <br><br>

         <fieldset>
        <legend>skills:</legend>

        <label for="checkbox1">HTML</label><br>
        <input type="checkbox" name="skills" id="checkbox1" value="HTML">
 <br><br>
        <label for="checkbox2">CSS</label><br>
        <input type="checkbox" name="skills" id="checkbox2" value="CSS">
 <br><br>
        <label for="checkbox3">JavaScript</label><br>
        <input type="checkbox" name="skills" id="checkbox3" value="JavaScript">
 </fieldset>
 <br>
 <label for="highesteducation">highesteducation:</label><br>
    <select name="highesteducation" id="highesteducation">
        <option value="a">a</option>
        <option value="b">b</option>
        <option value="c">c</option>
        <option value="d">d</option>
        <option value="e">e</option>
    </select><br>
    <fieldset>
        <legend>availability:</legend>
         <label for="radio1">full-time</label><br>
        <input type="radio" name="radio" id="radio1" value="full-time"><br>
        <label for="radio2">part-time</label><br>
        <input type="radio" name="radio" id="radio2" value="part-time">  
    </fieldset>
    <label for="textarea1">additional comments:</label><br>
    <textarea name="textarea1" id="textarea1" cols="20" rows="10"></textarea>
<input type="submit" value="submit application">
    </form>
</body>
</html>
